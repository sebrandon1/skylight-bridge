# skylight-bridge configuration
#
# Authentication: provide either email+password OR user_id+token.
auth:
  email: "your-email@example.com"
  password: "your-password"
  # user_id: "your-user-id"
  # token: "your-api-token"

# The Skylight frame to monitor.
frame_id: "your-frame-id"

# How often to poll the Skylight API for changes.
polling:
  interval: 30s

# Where to persist state between restarts (default: ~/.skylight-bridge/state.json).
# state_file: "~/.skylight-bridge/state.json"

# Built-in HTTP server for event history and health checks.
server:
  addr: ":8080"
  event_buffer_size: 100

# Logging configuration.
log:
  level: "info"     # debug, info, warn, error
  format: "json"    # json or text

# Google Photos sync (optional).
# Automatically uploads your most recent Google Photos to a Skylight frame.
#
# Prerequisites — set up once in Google Cloud Console:
#   1. Go to https://console.cloud.google.com/ and create (or select) a project.
#   2. Enable the "Photos Library API":
#      APIs & Services → Enable APIs → search "Photos Library API" → Enable.
#   3. Create OAuth 2.0 credentials:
#      APIs & Services → Credentials → Create Credentials → OAuth client ID
#      Application type: Desktop app  →  give it a name  →  Create.
#      Download the JSON — your client_id and client_secret are inside.
#   4. Obtain a refresh token (one-time):
#      Use the OAuth 2.0 Playground (https://developers.google.com/oauthplayground)
#        a. Click the gear icon → check "Use your own OAuth credentials"
#           and enter your client_id / client_secret.
#        b. In "Step 1", paste this scope and click Authorize:
#              https://www.googleapis.com/auth/photoslibrary.readonly
#        c. Sign in with the Google account that owns the photos.
#        d. Click "Exchange authorization code for tokens" (Step 2).
#        e. Copy the refresh_token value — it does not expire unless revoked.
#
# google_photos:
#   client_id: "123456789-abc.apps.googleusercontent.com"
#   client_secret: "GOCSPX-..."
#   refresh_token: "1//0g..."
#   frame_id: "your-frame-id"   # defaults to the top-level frame_id if omitted
#   sync_count: 50              # how many recent photos to pull each cycle (default: 50)
#   sync_interval: "1h"         # how often to check for new photos (default: 1h)

# Rules define what happens when events are detected.
rules:
  # Log all chore completions.
  - name: "log-chore-completed"
    event: "chore.completed"
    actions:
      - type: log
        config:
          message: "{{.assignee_name}} completed {{.chore_title}}"

  # Flash lights when a kid finishes all daily chores.
  - name: "all-chores-flash-lights"
    event: "chore.all_completed"
    # filters:
    #   assignee_name: "Alice"    # Optional: only match a specific kid
    actions:
      - type: homeassistant
        config:
          url: "http://homeassistant.local:8123"
          token: "YOUR_HA_LONG_LIVED_ACCESS_TOKEN"
          service: "light.turn_on"
          entity_id: "light.living_room"

  # Fire a webhook when a specific reward is redeemed.
  - name: "invest-in-voo"
    event: "reward.redeemed"
    filters:
      reward_title: "Invest $20 in VOO"
    actions:
      - type: webhook
        config:
          url: "https://your-app.example.com/invest"
          method: "POST"
          headers:
            Authorization: "Bearer your-api-key"
          # Optional: custom body template (default: full event JSON)
          # body_template: '{"ticker": "VOO", "amount": 20, "kid": "{{.child_name}}"}'

  # Log all reward redemptions.
  - name: "log-redemptions"
    event: "reward.redeemed"
    actions:
      - type: log

